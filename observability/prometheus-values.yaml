grafana:
  adminPassword: "MohamedMar2026!"
  defaultDashboardsEnabled: true
  service:
    type: NodePort
    nodePort: 32000
  nodeSelector:
    role: monitoring
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
  sidecar:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 3d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

alertmanager:
  enabled: false

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi

kube-state-metrics:
  nodeSelector:
    role: monitoring
  resources:
    requests:
      cpu: 25m
      memory: 64Mi