replicaCount: 2

student: "Mohamed-MAR"

image:
  repository: ghcr.io/scomrr/mohamed-mar-app
  tag: "0f4cdb5"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

ingress:
  enabled: false
  className: nginx
  host: mohamed-mar.local

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  interval: 15s

namespace: mohamed-mar
releaseName: mohamed-mar-release
